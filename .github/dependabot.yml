version: 2
updates:
  - package-ecosystem: cargo
    directory: /rust
    schedule:
      interval: weekly
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    groups:
      pub-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types: [minor, patch]
