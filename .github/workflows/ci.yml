name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format
        run: cargo fmt --check
        working-directory: rust
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: rust
      - name: Test
        run: cargo test
        working-directory: rust

  flutter:
    name: Flutter (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build: flutter build linux --debug
          - os: macos-latest
            build: flutter build macos --debug
          - os: windows-latest
            build: flutter build windows --debug
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Build (compiles Rust core via cargokit)
        run: ${{ matrix.build }}

  integration:
    name: Integration tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev xvfb
      - run: flutter pub get
      # screenshot_test.dart is a visual-review capture tool (no assertions,
      # documented for `-d macos`), not a CI check, so only app_test.dart
      # runs here. flutter test excludes integration_test/ by default, so
      # this is the only place these run.
      - name: Integration test (compiles Rust core via cargokit)
        run: xvfb-run -a flutter test integration_test/app_test.dart -d linux
