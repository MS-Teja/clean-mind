name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag and verify pubspec
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^version: ${VERSION}+" pubspec.yaml; then
            echo "::error::Tag is v${VERSION} but pubspec.yaml does not declare 'version: ${VERSION}+<build>'"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Both desktop targets so the Rust core is built universal.
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Verify the app is universal (arm64 + x86_64)
        shell: bash
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/Clean Mind.app"
          for bin in "$APP/Contents/MacOS/Clean Mind" \
                     "$APP/Contents/Frameworks/rust_lib_clean_mind.framework/Versions/A/rust_lib_clean_mind"; do
            info="$(lipo -info "$bin")"
            echo "$info"
            case "$info" in
              *x86_64*arm64*|*arm64*x86_64*) ;;
              *) echo "::error::$bin is not a universal binary"; exit 1 ;;
            esac
          done

      - name: Package DMG
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          cp -R "build/macos/Build/Products/Release/Clean Mind.app" staging/
          ln -s /Applications staging/Applications
          hdiutil create -volname "Clean Mind" -srcfolder staging -ov -format UDZO "CleanMind-${VERSION}-macos.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: CleanMind-*-macos.dmg

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag and verify pubspec
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^version: ${VERSION}+" pubspec.yaml; then
            echo "::error::Tag is v${VERSION} but pubspec.yaml does not declare 'version: ${VERSION}+<build>'"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: subosito/flutter-action@v2
        if: matrix.arch == 'x64'
        with:
          channel: stable
          cache: true
      # Flutter publishes no arm64 SDK archives for Linux/Windows, so
      # flutter-action can't install there. A git clone of the stable branch
      # bootstraps a native arm64 Dart SDK on first run instead.
      - name: Install Flutter from git (arm64)
        if: matrix.arch == 'arm64'
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/flutter/bin/flutter" --version

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging/clean-mind
          cp -R "build/linux/${{ matrix.arch }}/release/bundle/." staging/clean-mind/
          cp packaging/linux/io.github.msteja.cleanmind.desktop staging/clean-mind/
          cp packaging/linux/io.github.msteja.cleanmind.png staging/clean-mind/
          install -m 755 packaging/linux/install.sh staging/clean-mind/
          tar -czf "CleanMind-${VERSION}-linux-${{ matrix.arch }}.tar.gz" -C staging clean-mind

      - uses: actions/upload-artifact@v7
        with:
          name: linux-tarball-${{ matrix.arch }}
          path: CleanMind-*-linux-*.tar.gz

      - name: Package Debian package
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.arch }}" in
            x64) DEB_ARCH=amd64 ;;
            arm64) DEB_ARCH=arm64 ;;
            *) echo "::error::unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          desktop_id="io.github.msteja.cleanmind"

          root="debroot"
          mkdir -p "$root/opt/clean-mind" \
                   "$root/usr/bin" \
                   "$root/usr/share/applications" \
                   "$root/usr/share/icons/hicolor/512x512/apps" \
                   "$root/DEBIAN"

          cp -R "build/linux/${{ matrix.arch }}/release/bundle/." "$root/opt/clean-mind/"
          ln -s /opt/clean-mind/clean_mind "$root/usr/bin/clean-mind"
          cp packaging/linux/io.github.msteja.cleanmind.png \
            "$root/usr/share/icons/hicolor/512x512/apps/$desktop_id.png"

          # The tarball's desktop file relies on install.sh rewriting Exec= to
          # an absolute path; a .deb has a fixed install location, so bake
          # the real one in here instead of reusing that file verbatim.
          sed "s|^Exec=.*|Exec=/opt/clean-mind/clean_mind|" \
            packaging/linux/io.github.msteja.cleanmind.desktop \
            > "$root/usr/share/applications/$desktop_id.desktop"

          installed_size="$(du -sk "$root" | cut -f1)"
          # Written with printf (not a heredoc) so the YAML block's own
          # indentation can't leak into the control file: dpkg requires
          # fields to start at column 0 and continuation lines to start
          # with exactly one space.
          {
            printf 'Package: clean-mind\n'
            printf 'Version: %s\n' "${VERSION}"
            printf 'Section: utils\n'
            printf 'Priority: optional\n'
            printf 'Architecture: %s\n' "${DEB_ARCH}"
            printf 'Maintainer: Siva Teja Mutyala <sivatejamutyala@gmail.com>\n'
            printf 'Installed-Size: %s\n' "${installed_size}"
            printf 'Depends: libgtk-3-0\n'
            printf 'Description: Disk usage analyzer that understands developer bloat\n'
            printf ' Clean Mind scans folders and disks, visualizes usage as an\n'
            printf ' interactive treemap, and flags regenerable developer clutter\n'
            printf ' (build artifacts, caches, dependency directories) that is safe\n'
            printf ' to reclaim.\n'
          } > "$root/DEBIAN/control"

          dpkg-deb --build --root-owner-group "$root" "clean-mind_${VERSION}_${DEB_ARCH}.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-deb-${{ matrix.arch }}
          path: clean-mind_*_*.deb

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag and verify pubspec
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^version: ${VERSION}+" pubspec.yaml; then
            echo "::error::Tag is v${VERSION} but pubspec.yaml does not declare 'version: ${VERSION}+<build>'"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: subosito/flutter-action@v2
        if: matrix.arch == 'x64'
        with:
          channel: stable
          cache: true
      # Same story as Linux: no arm64 SDK archive, so install from git.
      - name: Install Flutter from git (arm64)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$env:RUNNER_TEMP\flutter"
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\flutter\bin"
          & "$env:RUNNER_TEMP\flutter\bin\flutter.bat" --version

      - run: flutter pub get
      - run: flutter build windows --release

      # Flutter's Release output doesn't include the VC++ runtime, so the app
      # fails to launch on machines without the redistributable installed.
      # Both runners are native for their arch, so System32 has the right DLLs.
      - name: Bundle VC++ runtime DLLs
        shell: pwsh
        run: |
          $release = "build\windows\${{ matrix.arch }}\runner\Release"
          foreach ($dll in "msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll") {
            Copy-Item "$env:SystemRoot\System32\$dll" $release
          }
          Get-ChildItem $release -Filter *.dll | Select-Object -ExpandProperty Name

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\${{ matrix.arch }}\runner\Release\*" -DestinationPath "CleanMind-${env:VERSION}-windows-${{ matrix.arch }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-zip-${{ matrix.arch }}
          path: CleanMind-*-windows-*.zip

  release:
    name: Create release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      # Body = "What's new" (curated, .github/release-notes.md) + install
      # instructions (.github/release-install.md). The action then appends
      # auto-generated notes for the full commit list. `<version>` in the
      # install doc becomes the real version so commands are copy-pasteable.
      - name: Compose release body
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          {
            if [ -f .github/release-notes.md ]; then
              cat .github/release-notes.md
              echo
            fi
            sed "s/<version>/${VERSION}/g" .github/release-install.md
          } > release-body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body_path: release-body.md
